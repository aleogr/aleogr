name: Go Source Continuous Delivery

on:
  workflow_call:
    inputs:
      go-version:
        description: "Versão do Go para o ambiente de execução"
        required: false
        type: string
        default: "1.26"

jobs:
  release:
    name: Create Official Source Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Verify module dependencies
        run: go mod verify

      - name: Generate Changelog and Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
